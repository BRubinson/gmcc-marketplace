# YEETED — YEETS Type Package.
# Grammar: $GMCC_PLUGIN_ROOT/skills/gmcc/SKILL.md (## YEETS section).
# Validator: /gm_compile.

name: Green Mountain Compiler Collection
uuid: 00000000-0000-0000-0000-000000000000
package: gmcc
yeet_version: "6.3"
yeet: []

description: |
  The core GMCC YEETS type definitions. Every other `.yeet.yaml` file in
  this plugin imports from `gmcc`.

  The nil UUID above is intentional: the `gmcc` package is the bootstrap
  package; its UUID is reserved as the canonical zero value.
  `/gm_compile` warns on nil UUIDs in other packages — `gmcc` is the
  documented exception.

  This package defines:

  - Base "boring ass" mixins (`has_*`) — small composable structs that
    carry one or two fields each. Larger structs use the `unwrap` keyword
    to compose them.
  - Runtime file types — top-level shapes for the four core ckfs yamls
    (`project_index.gmcc.yaml`, `project_data.gmcc.yaml`,
    `instance_data.gmcc.yaml`, `session_data.gmcc.yaml`).

sections:

  default:
    description: Default exports for the `gmcc` package.

    enums:

      gmcc_prompt_status:
        description: |
          Lifecycle status of a prompt authored by a bot workflow.
          Draft       — initial content written, kbite-seeded, no clarification yet.
          Clarifying  — clarify phase running; questions being asked.
          Clarified   — clarified yaml written, clarified_prompt_path set.
        values: [Draft, Clarifying, Clarified]

      gmcc_yeet_detection_source:
        description: |
          How a YEETS type was detected in an initial prompt during the
          first step of the Clarify phase.
          declared  — named explicitly in the prompt prose (e.g. "a new yeet
                      type for X").
          inferred  — not named, but proposed from a data shape the prompt
                      describes structurally.
        values: [declared, inferred]

      gmcc_yeet_detection_confidence:
        description: |
          How confidently a detected YEETS type was resolved.
          confident            — resolved directly without user input.
          needs_clarification  — could not be resolved confidently; the user
                                 was asked (via AskUserQuestion) to confirm the
                                 intended typing behavior, and the answer is
                                 recorded in resolved_to.
        values: [confident, needs_clarification]

      gmcc_phase_review_status:
        description: |
          Outcome of a bot workflow's review phase, recorded in
          session_data.phase_history.
          pass              — review found no blocking issues.
          pass_with_issues  — review surfaced issues; some may have been
                              deferred or accepted.
        values: [pass, pass_with_issues]

    structs:

      # --- Boring ass base mixins ---

      has_serial_id:
        description: |
          Monotonic integer identity within a scope. Not globally unique;
          pair with has_uuid for that.
        fields:
          id: int

      has_code:
        description: |
          Stable kebab/snake-style slug identifier. Human-readable but
          machine-safe. Distinct from has_name (which is display text).
        fields:
          code: string

      has_uuid:
        description: |
          Globally unique v4 UUID. The nil UUID is reserved for the
          bootstrap `gmcc` package only; everywhere else it is a warning.
        fields:
          uuid: uuid

      has_name:
        description: |
          Human-readable display name. May contain spaces, mixed case,
          etc. Use has_code for the slug form.
        fields:
          name: string

      has_description:
        description: |
          Free-text description of what this thing is or does.
        fields:
          description: string

      has_created_time:
        description: |
          ISO 8601 datetime of creation (e.g. `2026-06-21T15:40:00Z`), as the
          ckfs yamls actually store it. Typed `datetime` (an ISO 8601 string),
          NOT `timestamp` (which is an epoch-ms integer).
        fields:
          created_time: datetime

      has_updated_time:
        description: |
          ISO 8601 datetime of last update. Set equal to created_time on
          creation. Typed `datetime`, per has_created_time.
        fields:
          updated_time: datetime

      has_base_fields:
        description: |
          Standard identity + lifecycle bundle. Most addressable entities
          in GMCC unwrap this.
        fields:
          unwrap_has_serial_id: Unwrap<has_serial_id>
          unwrap_has_code: Unwrap<has_code>
          unwrap_has_uuid: Unwrap<has_uuid>
          unwrap_has_name: Unwrap<has_name>
          unwrap_has_description: Unwrap<has_description>
          unwrap_has_created_time: Unwrap<has_created_time>
          unwrap_has_updated_time: Unwrap<has_updated_time>

      has_gmcc_ckfs_absolute_path:
        description: |
          Absolute path on disk pointing inside the GMCC_CKFS_ROOT tree.
        fields:
          gmcc_ckfs_absolute_path: file_path

      has_gmcc_ckfs_relative_path:
        description: |
          Path relative to GMCC_CKFS_ROOT. Pair with the absolute form for
          portability and human-readable debugging.
        fields:
          gmcc_ckfs_relative_path: file_path

      has_ckfs_paths:
        description: |
          Standard ckfs path bundle. Anything that lives on disk inside
          GMCC_CKFS_ROOT unwraps this.
        fields:
          unwrap_has_gmcc_ckfs_absolute_path: Unwrap<has_gmcc_ckfs_absolute_path>
          unwrap_has_gmcc_ckfs_relative_path: Unwrap<has_gmcc_ckfs_relative_path>

      has_kbite_list:
        description: |
          File-level kbite registry. Lists the kbites that apply to this
          file and anything it owns. Seeded from the parent file at
          lazy-create time (detect_repo.sh for project → instance → session,
          bot workflows for session → prompt); subsequent parent edits do
          NOT propagate. Each file's list is fully independent once
          written.
        fields:
          kbite: List<string>

      has_system_path:
        description: |
          Absolute path on the user's system that is NOT inside GMCC_CKFS_ROOT.
          Used for things like an instance's underlying repo checkout.
        fields:
          system_path: file_path

      # --- Core runtime file formats ---
      #
      # The four top-level ckfs yamls. Each file's body conforms to one
      # of these structs (via the yaml's `yeet_type:` key).

      gmcc_project_index_file:
        description: |
          Top-level shape of $GMCC_PROJECTS/project_index.gmcc.yaml.
          A flat registry of every project tracked under this ckfs root.
          Each project entry is a minimal identity stub; the per-project
          instance and session lists live in project_data.gmcc.yaml and
          instance_data.gmcc.yaml respectively.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          unwrap_has_kbite_list: Unwrap<has_kbite_list>
          projects: List<gmcc_project_index_file_project_entry>

      gmcc_project_index_file_project_entry:
        description: |
          One project's entry in the project_index registry. Identity
          only — follow gmcc_ckfs_absolute_path to that project's
          project_data.gmcc.yaml for instances.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>

      gmcc_project_data_file:
        description: |
          Top-level shape of {project}/project_data.gmcc.yaml. Per-project
          identity, repository metadata, and the list of instances for
          this project.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          unwrap_has_kbite_list: Unwrap<has_kbite_list>
          repository_name: string
          http_uri: http_uri?
          ssh_uri: ssh_uri?
          instances: List<gmcc_project_data_file_instance_entry>

      gmcc_project_data_file_instance_entry:
        description: |
          One instance's entry inside a project_data file. An instance is
          a checkout of the project's repo on the user's system, so it
          carries has_system_path in addition to the ckfs paths. Follow
          gmcc_ckfs_absolute_path to that instance's instance_data.gmcc.yaml
          for the session list.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          unwrap_has_system_path: Unwrap<has_system_path>

      gmcc_instance_data_file:
        description: |
          Top-level shape of {instance}/instance_data.gmcc.yaml. An instance
          is a unique filesystem path to a repo checkout; it carries both
          the ckfs paths and the repo's system path, a back-reference to
          its project, and the list of its sessions.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          unwrap_has_kbite_list: Unwrap<has_kbite_list>
          unwrap_has_system_path: Unwrap<has_system_path>
          project_uuid: uuid
          sessions: List<gmcc_instance_data_file_session_entry>

      gmcc_instance_data_file_session_entry:
        description: |
          One session's entry inside an instance_data file. A session
          corresponds to a git branch within the instance. The `branch:`
          field carries the raw branch name; `code` carries the
          slug-sanitized form used as the directory name. Follow
          gmcc_ckfs_absolute_path to that session's session_data.gmcc.yaml
          for its prompts and changed-files history.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          branch: string

      gmcc_session_data_file:
        description: |
          Top-level shape of {session}/session_data.gmcc.yaml. A session
          corresponds to a git branch within an instance. v10.0.0 promotes
          prompts and changed_files from untyped string lists to typed
          struct entries.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          unwrap_has_kbite_list: Unwrap<has_kbite_list>
          branch: string
          instance_uuid: uuid
          project_uuid: uuid
          backstory:
            type: string
            description: |
              Session-level narrative context. Seeded empty at session
              creation (detect_repo.sh copies the SESSION_TEMPLATE value, which
              is ""). A future tool may populate it. New prompts inherit this
              value into their initial prompt's `backstory` field at draft-create
              time; a prompt's backstory may then diverge from the session's.
          prompts: List<gmcc_session_data_file_prompt_files_entry>
          changed_files: List<gmcc_session_data_file_changed_files_entry>
          phase_history:
            type: List<gmcc_session_data_file_phase_history_entry>?
            description: |
              Audit trail of completed bot-workflow runs against prompts in this
              session. Appended by bot workflows on completion (created on first
              completion — absent in a fresh session). NOTE: the separate
              `cleanup_actions:` list (written by the cleanup commands) is owned and typed
              by the cleanup workflow, not declared here.

      gmcc_session_data_file_prompt_files_entry:
        description: |
          Lightweight scan stub for one prompt inside a session_data file.
          Not a full has_base_fields unwrap — the prompt_data file at
          `path` is the source of truth for identity, timestamps, and the
          kbite list. These fields are enough to render a session
          overview / pick a resume target without opening every
          prompt_data file.
        fields:
          id: int
          name: string
          status: Enum<gmcc_prompt_status>
          path: file_path

      gmcc_session_data_file_changed_files_entry:
        description: |
          Per-edit record appended to session_data.changed_files by bot
          workflows after each Read/Edit/Write. `lines` is a list of
          [start, end] inclusive line-range pairs. `commit` is short sha
          or the literal string "uncommitted". `note` is an optional
          one-liner describing the edit's intent.
        fields:
          file: file_path
          timestamp: datetime
          lines: List<List<int>>
          commit: string
          note: string

      gmcc_session_data_file_phase_history_entry:
        description: |
          One completed bot-workflow run recorded in
          session_data.phase_history. `review_status` is null for the
          lightweight /gm_bot tier (no review phase). `teams_used` is populated
          only by /gm_bot_team (the team names spawned, e.g. explore / architect
          / review); null for the other tiers.
        fields:
          prompt_id: int
          command: string
          completed_at: datetime
          review_status: Enum<gmcc_phase_review_status>?
          teams_used: List<string>?

      # --- Session file index ---
      #
      # The per-session catalog file that sits alongside session_data.gmcc.yaml
      # (one per session). Created/maintained by the gmcc_session_creation skill
      # and audited by /gmcc_session_cleanup.

      gmcc_session_file_index_file:
        description: |
          Top-level shape of {session}/gmcc_session_file_index.yaml. A
          per-session catalog that sits alongside session_data.gmcc.yaml and
          indexes two things: the session's architecture decision records and
          its yeeted sections. Seeded by the gmcc_session_creation skill (not
          by detect_repo.sh) and maintained thereafter. The two payload fields
          are flat top-level keys (no wrapper key).
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          architecture_decision_records: List<gmcc_session_file_index_adr_entry>
          yeeted: gmcc_session_file_index_yeeted_section

      gmcc_session_file_index_adr_entry:
        description: |
          One architecture decision record entry in a session file index.
          Lightweight identity stub modeled on
          gmcc_session_data_file_prompt_files_entry — id + display name +
          a free-text description of the decision.
        fields:
          id: int
          name: string
          description: string

      gmcc_session_file_index_yeeted_section:
        description: |
          TODO (stub): the yeeted-sections payload of a session file index.
          Intentionally fieldless for now; a later prompt defines its shape.
          Declared so gmcc_session_file_index_file.yeeted can reference a real
          type today. Do not add fields without bumping the relevant schema.
        fields: {}

      gmcc_prompt_data_file:
        description: |
          Top-level shape of {prompt_folder}/{id}_{name}_data.gmcc.yaml.
          Identity-and-paths index for one prompt. Initial and clarified
          prompt content live in sibling files (NOT inline) so they
          remain human-editable. memory/ siblings store explore /
          architecture / review artifacts from bot workflows.

          clarified_prompt_path is empty-string until prompt_status
          transitions to Clarified.
        fields:
          unwrap_has_base_fields: Unwrap<has_base_fields>
          unwrap_has_ckfs_paths: Unwrap<has_ckfs_paths>
          unwrap_has_kbite_list: Unwrap<has_kbite_list>
          initial_prompt_path: file_path
          clarified_prompt_path: file_path
          prompt_status: Enum<gmcc_prompt_status>
          command: string

      gmcc_initial_prompt_file:
        description: |
          Body shape of {prompt_folder}/{id}_{name}_initial.yaml — the raw,
          human-authored starting point for a prompt, split into three narrative
          components (the "prompt style"). The file keeps its plain `.yaml`
          suffix but carries top-level `yeet:` + `yeet_type: gmcc.gmcc_initial_prompt_file`
          headers so `/gm_compile` validates it.

          backstory — inherited from the parent session_data's `backstory` at
            draft-create time (empty unless a session backstory has been set);
            may diverge per prompt thereafter.
          goal — the generally desired outcome of the prompt, akin to acceptance
            criteria.
          detail — how to accomplish the goal: the rest of the specifics.

          `kbite_context_summary` is populated only by the subagent/team tiers
          (/gm_bot_rpi, /gm_bot_team) and passed into spawned agents; it is null
          for the lightweight /gm_bot tier.
        fields:
          backstory: string
          goal: string
          detail: string
          kbites_loaded: List<string>
          kbite_context_summary: string?

      gmcc_prompt_clarification:
        description: |
          One question/answer pair captured during the Clarify phase. `rating`
          is optional — the agent-teams tier (/gm_bot_team) annotates each
          clarification with a 1-8 criticality rating; the other tiers omit it.
        fields:
          q: string
          a: string
          rating: int?

      gmcc_detected_yeet_type:
        description: |
          One YEETS type detected in the initial prompt during the first step of
          the Clarify phase. `type` is the detected/declared type token (or a
          short description of the inferred shape); `resolved_to` is what it was
          determined to mean (a concrete struct/enum, an action to take, or the
          user's clarified intent). `source` records whether it was named in the
          prose or structurally inferred; `confidence` records whether the user
          had to be asked.
        fields:
          type: string
          resolved_to: string
          source: Enum<gmcc_yeet_detection_source>
          confidence: Enum<gmcc_yeet_detection_confidence>

      gmcc_clarified_prompt_key_file:
        description: |
          A file flagged as relevant during Clarify. `consensus` is populated
          only by the agent-teams tier (which agents/methodologies flagged it);
          null for the other tiers.
        fields:
          path: file_path
          relevance: string
          consensus: string?

      gmcc_clarified_prompt_file:
        description: |
          Body shape of {prompt_folder}/{id}_{name}_clarified.yaml — the single
          source of truth after Clarify. Mirrors the initial file's split: `goal`
          and `detail` each get their own clarification suite and refined section.
          `backstory` carries through from the initial file. `detected_yeet_types`
          records every YEETS type detected in the initial prompt and how each was
          resolved. The file keeps its `.yaml` suffix and carries top-level
          `yeet:` + `yeet_type: gmcc.gmcc_clarified_prompt_file` headers.

          `patterns_to_follow` is populated by the subagent/team tiers; null for
          the lightweight tier.
        fields:
          clarified_at: datetime
          backstory: string
          goal_clarifications: List<gmcc_prompt_clarification>
          detail_clarifications: List<gmcc_prompt_clarification>
          refined_goal: string
          refined_detail: string
          detected_yeet_types: List<gmcc_detected_yeet_type>
          key_files: List<gmcc_clarified_prompt_key_file>
          patterns_to_follow: List<string>?
          constraints: List<string>
          kbites_loaded: List<string>
