# GMCC Projects Registry
#
# Authoritative list of every project tracked under this CKFS root.
# Maintained by detect_repo.sh (lazy registration on SessionStart) and /gm_cleanup.
#
# Schema is intentionally minimal in v6.0.0 — fuller schema lands in a follow-up.

version: 1
projects: []
# Each project entry, when populated, has the shape:
#   - name: {project_name}                 # = git repo dir basename
#     path: {GMCC_PROJECTS}/{project_name}
#     registered_at: {ISO 8601 timestamp}
#     instances:
#       - id: {slug_of_abs_path}
#         abs_path: {original absolute path to the repo checkout}
#         registered_at: {ISO 8601 timestamp}
