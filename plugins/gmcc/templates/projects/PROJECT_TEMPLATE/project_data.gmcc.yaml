# project_data.gmcc.yaml — per-project identity, repo metadata, instance list.
#
# Copied by detect_repo.sh on first detection of a new project. The
# PROJECT_TEMPLATE_* placeholders are rewritten at copy time.
#
# Conforms to gmcc.gmcc_project_data_file (see $GMCC_PLUGIN_ROOT/gmcc.yeet.md).

yeet:
  - gmcc
yeet_type: gmcc.gmcc_project_data_file

id: 1
code: PROJECT_TEMPLATE_CODE
uuid: PROJECT_TEMPLATE_UUID
name: PROJECT_TEMPLATE_NAME
description: ""
created_time: PROJECT_TEMPLATE_CREATED_AT
updated_time: PROJECT_TEMPLATE_CREATED_AT
gmcc_ckfs_absolute_path: PROJECT_TEMPLATE_CKFS_ABS_PATH
gmcc_ckfs_relative_path: PROJECT_TEMPLATE_CKFS_REL_PATH
repository_name: PROJECT_TEMPLATE_CODE
http_uri: null
ssh_uri: null

instances: []
# Each instance entry conforms to gmcc_project_data_file_instance_entry:
#   - id: int
#     code: {slug_of_abs_path}
#     uuid: {v4}
#     name: {display name}
#     description: ""
#     created_time: {ISO 8601}
#     updated_time: {ISO 8601}
#     gmcc_ckfs_absolute_path: ...
#     gmcc_ckfs_relative_path: ...
#     system_path: {original abs path to repo checkout}
