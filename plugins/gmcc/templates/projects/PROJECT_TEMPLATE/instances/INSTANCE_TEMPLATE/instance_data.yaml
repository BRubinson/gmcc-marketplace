# instance_data.yaml — per-instance metadata.
#
# An instance is a unique filesystem path to a checkout of the parent project's
# repository. INSTANCE_TEMPLATE_ID is rewritten to the slugified absolute path
# at copy time, and INSTANCE_TEMPLATE_ABS_PATH is rewritten to the original path.
#
# Schema is intentionally minimal in v6.0.0 — fuller schema lands in a follow-up.

version: 1
id: INSTANCE_TEMPLATE_ID
abs_path: INSTANCE_TEMPLATE_ABS_PATH
project: INSTANCE_TEMPLATE_PROJECT_NAME
created_at: INSTANCE_TEMPLATE_CREATED_AT
# Future fields (deferred): nickname, primary_remote, default_branch, notes.
