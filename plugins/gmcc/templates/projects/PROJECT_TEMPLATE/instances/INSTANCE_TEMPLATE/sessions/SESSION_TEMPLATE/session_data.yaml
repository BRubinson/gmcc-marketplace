# session_data.yaml — per-branch session state.
#
# A session corresponds to a git branch within an instance. SESSION_TEMPLATE_BRANCH
# is rewritten to the sanitized branch name at copy time.
#
# Schema is intentionally minimal in v6.0.0 — fuller schema lands in a follow-up.

version: 1
branch: SESSION_TEMPLATE_BRANCH
instance: SESSION_TEMPLATE_INSTANCE_ID
project: SESSION_TEMPLATE_PROJECT_NAME
started_at: SESSION_TEMPLATE_CREATED_AT

# Prompts authored by bot workflows. Files live in ./prompts/.
# Status flow: draft -> clarified.
# Each entry:
#   - id: {monotonic int}
#     name: {kebab-case slug supplied at /gm_bot* time}
#     status: draft | clarified
#     draft_file: prompts/{id}_{name}.yaml
#     clarified_file: prompts/{id}_{name}_clarified.yaml   # present when status == clarified
prompts: []

# Files modified during this session. Maintained by bot workflows on each edit.
# Each entry:
#   - file: {relative path inside the instance}
#     timestamp: {ISO 8601}
#     lines:                              # list of line ranges touched
#       - [start, end]
#     commit: {short sha or "uncommitted"}
changed_files: []
