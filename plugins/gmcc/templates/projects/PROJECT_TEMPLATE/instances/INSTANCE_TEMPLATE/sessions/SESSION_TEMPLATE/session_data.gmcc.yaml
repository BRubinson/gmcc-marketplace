# session_data.gmcc.yaml — per-branch session state.
#
# A session corresponds to a git branch within an instance.
# SESSION_TEMPLATE_* placeholders are rewritten at copy time.
#
# Conforms to gmcc.gmcc_session_data_file (see $GMCC_PLUGIN_ROOT/gmcc.yeet.yaml).

yeet:
  - gmcc
yeet_type: gmcc.gmcc_session_data_file

id: 1
code: SESSION_TEMPLATE_CODE
uuid: SESSION_TEMPLATE_UUID
name: SESSION_TEMPLATE_NAME
description: ""
created_time: SESSION_TEMPLATE_CREATED_AT
updated_time: SESSION_TEMPLATE_CREATED_AT
gmcc_ckfs_absolute_path: SESSION_TEMPLATE_CKFS_ABS_PATH
gmcc_ckfs_relative_path: SESSION_TEMPLATE_CKFS_REL_PATH
branch: SESSION_TEMPLATE_BRANCH
instance_uuid: SESSION_TEMPLATE_INSTANCE_UUID
project_uuid: SESSION_TEMPLATE_PROJECT_UUID

# Session-level narrative context. Seeded empty; a future tool may populate it.
# New prompts inherit this value into their initial prompt's `backstory` field at
# draft-create time (the prompt's backstory may then diverge).
backstory: ""

# File-level kbite registry. Seeded from parent instance_data at
# lazy-create time only; subsequent parent edits do NOT propagate.
kbite: []

# Prompts authored by bot workflows. Each prompt is a folder at
# prompts/{id}_{name}/ containing {id}_{name}_data.gmcc.yaml (the
# gmcc_prompt_data_file), {id}_{name}_initial.yaml, optionally
# {id}_{name}_clarified.yaml, and a memory/ subdir for bot artifacts.
# Each entry below conforms to gmcc_session_data_file_prompt_files_entry:
#   - id: int
#     name: {prompt_name}
#     status: Draft | Clarifying | Clarified
#     path: prompts/{id}_{name}/{id}_{name}_data.gmcc.yaml
prompts: []

# Files modified during this session. Maintained by bot workflows on each
# edit. Each entry conforms to gmcc_session_data_file_changed_files_entry:
#   - file: {path}
#     timestamp: {ISO 8601}
#     lines: [[start, end], ...]
#     commit: {short sha | "uncommitted"}
#     note: ""
changed_files: []
